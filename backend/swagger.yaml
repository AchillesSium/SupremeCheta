openapi: 3.0.0
info:
  title: Supreme Cheta API
  description: Multi-vendor E-commerce Platform API
  version: 1.3.1
  contact:
    email: support@supremecheta.com

servers:
  - url: http://localhost:5001/api
    description: Development server
  - url: https://api.supremecheta.com
    description: Production server

tags:
  - name: Authentication
  - name: Products
  - name: Product Media
  - name: Product Tags
  - name: Categories
  - name: Brands

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ---------- COMMON ----------
    ObjectId:
      type: string
      description: MongoDB ObjectId
      example: "652f1c8a2c5d3f0012ab34cd"

    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Something went wrong

    # ---------- USERS / AUTH ----------
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        role:
          type: string
          enum: [customer, vendor, admin]
        profile:
          type: object
          properties:
            firstName: { type: string }
            lastName: { type: string }
            phone: { type: string }

    # ---------- PRODUCT MEDIA ----------
    ProductMediaKind:
      type: string
      enum: [image, video]

    ProductMedia:
      type: object
      properties:
        id: { $ref: '#/components/schemas/ObjectId' }
        product_id: { $ref: '#/components/schemas/ObjectId' }
        kind: { $ref: '#/components/schemas/ProductMediaKind' }
        url: { type: string, format: uri }
        title: { type: string, nullable: true }
        alt: { type: string, nullable: true }
        mimeType: { type: string, nullable: true }
        isPrimary: { type: boolean, default: false }
        sortOrder: { type: integer, default: 0 }
        attributes:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              value: { type: string }
        width: { type: integer, nullable: true }
        height: { type: integer, nullable: true }
        provider:
          type: string
          nullable: true
          enum: [self, youtube, vimeo, other]
        providerId: { type: string, nullable: true }
        thumbnailUrl: { type: string, format: uri, nullable: true }
        durationSec: { type: integer, nullable: true }
        createdAt: { type: string, format: date-time, readOnly: true }
        updatedAt: { type: string, format: date-time, readOnly: true }

    ProductMediaUploadForm:
      type: object
      description: Multipart form that accepts images and/or videos. Send files under any of the supported fields.
      properties:
        images:
          type: array
          items: { type: string, format: binary }
          description: Array of image files
        videos:
          type: array
          items: { type: string, format: binary }
          description: Array of video files
        media:
          type: array
          items: { type: string, format: binary }
          description: Mixed array of image/video files
        primaryImageIndex:
          type: integer
          description: Index (0-based) among received image files to mark as primary
        primaryVideoIndex:
          type: integer
          description: Index (0-based) among received video files to mark as primary
        sortOrder:
          type: integer
        alt:
          type: string
        provider:
          type: string
          enum: [self, youtube, vimeo, other]
        providerId:
          type: string
        thumbnailUrl:
          type: string
          format: uri
        durationSec:
          type: integer

    # ---------- PRODUCT TAGS ----------
    ProductTag:
      type: object
      properties:
        id: { $ref: '#/components/schemas/ObjectId' }
        tag_name:
          type: string
          example: "shoes"
        product_ids:
          type: array
          description: Product IDs attached to this tag (empty array means not attached to any product)
          items: { $ref: '#/components/schemas/ObjectId' }
          example: ["652f1c8a2c5d3f0012ab34cd"]
        createdAt: { type: string, format: date-time, readOnly: true }
        updatedAt: { type: string, format: date-time, readOnly: true }

    ProductTagCreate:
      type: object
      properties:
        tag_name:
          type: string
          example: "shoes"
        product_id:
          $ref: '#/components/schemas/ObjectId'
          description: Optional in POST. If provided, it will be added into product_ids.
      required: [tag_name]

    ProductTagAttach:
      type: object
      properties:
        product_id:
          $ref: '#/components/schemas/ObjectId'
          description: Required in PUT. Product ID to attach to the tag.
      required: [product_id]

    ProductTagResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data: { $ref: '#/components/schemas/ProductTag' }

    ProductTagListResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        results: { type: integer, example: 1 }
        data:
          type: array
          items: { $ref: '#/components/schemas/ProductTag' }

    # ---------- PRODUCTS ----------
    ProductInventory:
      type: object
      properties:
        quantity: { type: number, example: 5 }
        sku: { type: string, example: "SKU-12345" }
        status:
          type: string
          enum: [in_stock, low_stock, out_of_stock]

    ProductSpecification:
      type: object
      properties:
        name: { type: string }
        value: { type: string }

    ProductRatings:
      type: object
      properties:
        average: { type: number, minimum: 0, maximum: 5, default: 0 }
        count: { type: number, default: 0 }

    ProductStatus:
      type: string
      enum: [draft, published, archived]

    Product:
      type: object
      description: Product resource returned by the API
      properties:
        id: { $ref: '#/components/schemas/ObjectId' }
        name: { type: string }
        description: { type: string }
        price: { type: number }
        categories:
          type: array
          items: { $ref: '#/components/schemas/ObjectId' }
        brand: { $ref: '#/components/schemas/ObjectId' }
        vendor: { $ref: '#/components/schemas/ObjectId' }
        images:
          type: array
          items:
            type: object
            properties:
              url: { type: string, format: uri }
              alt: { type: string }
        inventory: { $ref: '#/components/schemas/ProductInventory' }
        specifications:
          type: array
          items: { $ref: '#/components/schemas/ProductSpecification' }
        ratings: { $ref: '#/components/schemas/ProductRatings' }
        tags:
          type: array
          description: Product tags (stored in ProductTag collection)
          items: { type: string }
          example: ["shoes", "men", "winter"]
        status: { $ref: '#/components/schemas/ProductStatus' }
        createdAt: { type: string, format: date-time, readOnly: true }
        updatedAt: { type: string, format: date-time, readOnly: true }

    ProductCreate:
      type: object
      description: JSON body to create a product
      properties:
        name: { type: string }
        description: { type: string }
        price: { type: number }
        categories:
          type: array
          items: { $ref: '#/components/schemas/ObjectId' }
        brand: { $ref: '#/components/schemas/ObjectId' }
        vendor: { $ref: '#/components/schemas/ObjectId' }
        quantity: { type: number, default: 0 }
        sku: { type: string }
        specifications:
          type: array
          items: { $ref: '#/components/schemas/ProductSpecification' }
        tags:
          type: array
          items: { type: string }
          example: ["shoes", "men"]
        status: { $ref: '#/components/schemas/ProductStatus' }
      required: [name, description, price, categories, sku]

    ProductUpdate:
      type: object
      description: JSON body to update a product
      properties:
        name: { type: string }
        description: { type: string }
        price: { type: number }
        categories:
          type: array
          items: { $ref: '#/components/schemas/ObjectId' }
        brand: { $ref: '#/components/schemas/ObjectId' }
        quantity: { type: number }
        sku: { type: string }
        specifications:
          type: array
          items: { $ref: '#/components/schemas/ProductSpecification' }
        tags:
          type: array
          items: { type: string }
          example: ["shoes", "men"]
        status: { $ref: '#/components/schemas/ProductStatus' }

    ProductListResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: array
          items: { $ref: '#/components/schemas/Product' }
        pagination:
          type: object
          properties:
            page: { type: integer }
            limit: { type: integer }
            total: { type: integer }
            pages: { type: integer }

    # ---------- CATEGORIES ----------
    Category:
      type: object
      properties:
        id: { $ref: '#/components/schemas/ObjectId' }
        name: { type: string }
        imageUrl: { type: string, nullable: true }
        parent: { $ref: '#/components/schemas/ObjectId' }
        createdAt: { type: string, format: date-time, readOnly: true }
        updatedAt: { type: string, format: date-time, readOnly: true }

    CategoryCreate:
      type: object
      properties:
        name: { type: string }
        parent: { $ref: '#/components/schemas/ObjectId' }
        image:
          type: string
          format: binary
      required: [name]

    CategoryUpdate:
      type: object
      properties:
        name: { type: string }
        parent: { $ref: '#/components/schemas/ObjectId' }
        image:
          type: string
          format: binary

    # ---------- BRANDS ----------
    Brand:
      type: object
      properties:
        id: { $ref: '#/components/schemas/ObjectId' }
        name: { type: string }
        logoUrl: { type: string, nullable: true }
        createdAt: { type: string, format: date-time, readOnly: true }
        updatedAt: { type: string, format: date-time, readOnly: true }

    BrandCreate:
      type: object
      properties:
        name: { type: string }
        logo:
          type: string
          format: binary
      required: [name]

    BrandUpdate:
      type: object
      properties:
        name: { type: string }
        logo:
          type: string
          format: binary

  parameters:
    Page:
      in: query
      name: page
      schema: { type: integer, default: 1, minimum: 1 }
    Limit:
      in: query
      name: limit
      schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
    SearchQ:
      in: query
      name: q
      schema: { type: string }
      description: Full-text search string
    ProductStatus:
      in: query
      name: status
      schema:
        $ref: '#/components/schemas/ProductStatus'
    VendorId:
      in: query
      name: vendor
      schema: { $ref: '#/components/schemas/ObjectId' }
    BrandId:
      in: query
      name: brand
      schema: { $ref: '#/components/schemas/ObjectId' }
    CategoryIdQuery:
      in: query
      name: category
      schema: { $ref: '#/components/schemas/ObjectId' }
    MinPrice:
      in: query
      name: minPrice
      schema: { type: number }
    MaxPrice:
      in: query
      name: maxPrice
      schema: { type: number }
    Sort:
      in: query
      name: sort
      schema: { type: string, example: "-createdAt" }

paths:
  # ---------- AUTH ----------
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
                role: { type: string, enum: [customer, vendor, admin] }
      responses:
        '201': { description: User created successfully }
        '400': { description: Invalid input }

  /auth/login:
    post:
      tags: [Authentication]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200': { description: Login successful }
        '401': { description: Invalid credentials }

  # ---------- PRODUCTS ----------
  /products:
    get:
      tags: [Products]
      summary: Get products (filter, paginate, search)
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/SearchQ'
        - $ref: '#/components/parameters/ProductStatus'
        - $ref: '#/components/parameters/VendorId'
        - $ref: '#/components/parameters/BrandId'
        - $ref: '#/components/parameters/CategoryIdQuery'
        - $ref: '#/components/parameters/MinPrice'
        - $ref: '#/components/parameters/MaxPrice'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: Paginated product list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'

    post:
      tags: [Products]
      summary: Create a new product
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreate'
      responses:
        '201':
          description: Product created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/Product' }
        '401': { description: Unauthorized }
        '403': { description: Forbidden - Not a vendor }
        '400':
          description: Invalid input
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ---------- PRODUCT TAGS ----------
  /products/tags:
    get:
      tags: [Product Tags]
      summary: Get all product tags
      description: Returns all tags in ProductTag collection.
      responses:
        '200':
          description: List of all product tags
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductTagListResponse' }
        '400':
          description: Failed to fetch tags
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

    post:
      tags: [Product Tags]
      summary: Create or get a tag by name (product_id optional)
      description: |
        Creates or returns an existing tag by tag_name.
        If product_id is provided, it will be added into product_ids.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductTagCreate' }
      responses:
        '200':
          description: Tag returned (created or existing)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductTagResponse' }
        '400':
          description: Invalid input
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { description: Unauthorized }

  /products/tags/{tagId}:
    put:
      tags: [Product Tags]
      summary: Attach product to a tag (product_id required)
      description: Adds the given product_id into product_ids array for the tag.
      security:
        - BearerAuth: []
      parameters:
        - name: tagId
          in: path
          required: true
          schema: { $ref: '#/components/schemas/ObjectId' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductTagAttach' }
      responses:
        '200':
          description: Product attached to tag successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductTagResponse' }
        '400':
          description: Invalid tag id or missing/invalid product_id
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Tag not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { description: Unauthorized }

  # ✅ NEW: DETACH PRODUCT FROM TAG
  /products/tags/{tagId}/product/{productId}:
    delete:
      tags: [Product Tags]
      summary: Detach product from a tag
      description: Removes productId from tag.product_ids and removes tagId from product.tags.
      security:
        - BearerAuth: []
      parameters:
        - name: tagId
          in: path
          required: true
          schema: { $ref: '#/components/schemas/ObjectId' }
        - name: productId
          in: path
          required: true
          schema: { $ref: '#/components/schemas/ObjectId' }
      responses:
        '200':
          description: Product detached from tag successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: '#/components/schemas/ProductTag' }
                  message: { type: string, example: "Product detached from tag" }
        '400':
          description: Invalid tag id or product id
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Tag not found or Product not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { description: Unauthorized }

  /products/{id}/tags:
    get:
      tags: [Product Tags]
      summary: Get all tags for a product
      description: Returns tags where product_ids contains the given product id.
      parameters:
        - name: id
          in: path
          required: true
          schema: { $ref: '#/components/schemas/ObjectId' }
      responses:
        '200':
          description: List of tags for the product
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductTagListResponse' }
        '400':
          description: Invalid product id
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /products/{id}:
    get:
      tags: [Products]
      summary: Get a product by ID (with media)
      parameters:
        - name: id
          in: path
          required: true
          schema: { $ref: '#/components/schemas/ObjectId' }
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/Product' }
        '404': { description: Product not found }

    put:
      tags: [Products]
      summary: Update a product by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { $ref: '#/components/schemas/ObjectId' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductUpdate' }
      responses:
        '200':
          description: Product updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/Product' }
        '400': { description: Invalid input }
        '401': { description: Unauthorized }
        '404': { description: Product not found }

    delete:
      tags: [Products]
      summary: Delete a product by ID (and its media)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { $ref: '#/components/schemas/ObjectId' }
      responses:
        '200': { description: Product deleted successfully }
        '404': { description: Product not found }
        '401': { description: Unauthorized }

  # ---------- PRODUCT MEDIA ----------
  /products/{id}/media:
    post:
      tags: [Product Media]
      summary: Upload images and/or videos for a product
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { $ref: '#/components/schemas/ObjectId' }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProductMediaUploadForm'
      responses:
        '201':
          description: Media uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ProductMedia' }
        '400': { description: No files uploaded or invalid input }
        '401': { description: Unauthorized }
        '404': { description: Product not found }

    get:
      tags: [Product Media]
      summary: List media for a product
      parameters:
        - name: id
          in: path
          required: true
          schema: { $ref: '#/components/schemas/ObjectId' }
      responses:
        '200':
          description: List of media items for the product
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ProductMedia' }

  /products/{id}/media/{mediaId}/primary:
    patch:
      tags: [Product Media]
      summary: Set a media item as primary (per kind)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { $ref: '#/components/schemas/ObjectId' }
        - name: mediaId
          in: path
          required: true
          schema: { $ref: '#/components/schemas/ObjectId' }
        - name: kind
          in: query
          required: true
          schema: { $ref: '#/components/schemas/ProductMediaKind' }
      responses:
        '200':
          description: Primary media set
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/ProductMedia' }
        '400': { description: Invalid kind }
        '401': { description: Unauthorized }
        '404': { description: Media not found }

  /products/{id}/media/{mediaId}:
    delete:
      tags: [Product Media]
      summary: Delete a media item
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { $ref: '#/components/schemas/ObjectId' }
        - name: mediaId
          in: path
          required: true
          schema: { $ref: '#/components/schemas/ObjectId' }
      responses:
        '200': { description: Media deleted successfully }
        '401': { description: Unauthorized }
        '404': { description: Media not found }

  # ---------- CATEGORIES ----------
  /categories:
    get:
      tags: [Categories]
      summary: Get all categories
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'

    post:
      tags: [Categories]
      summary: Create a new category (with optional image upload)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CategoryCreate'
      responses:
        '201':
          description: Category created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400': { description: Invalid input }
        '401': { description: Unauthorized }
        '403': { description: Forbidden - Not an admin }

  /categories/{id}:
    get:
      tags: [Categories]
      summary: Get a category by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Category details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '404': { description: Category not found }

    put:
      tags: [Categories]
      summary: Update a category (optionally replace image)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CategoryUpdate'
      responses:
        '200':
          description: Category updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400': { description: Invalid input }
        '401': { description: Unauthorized }
        '404': { description: Category not found }

    delete:
      tags: [Categories]
      summary: Delete a category
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Category deleted successfully }
        '404': { description: Category not found }
        '403': { description: Forbidden - Only admins can delete categories }

  /categories/{id}/subcategories:
    get:
      tags: [Categories]
      summary: Get subcategories of a category
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: List of subcategories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
        '404': { description: Category not found }

  # ---------- BRANDS ----------
  /brands:
    get:
      tags: [Brands]
      summary: Get brands (with optional pagination & search)
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 10 }
        - in: query
          name: search
          schema: { type: string }
      responses:
        '200':
          description: Paginated list of brands
          content:
            application/json:
              schema:
                type: object
                properties:
                  page: { type: integer }
                  limit: { type: integer }
                  total: { type: integer }
                  totalPages: { type: integer }
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Brand'

    post:
      tags: [Brands]
      summary: Create a new brand (with optional logo upload)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BrandCreate'
      responses:
        '201':
          description: Brand created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Brand'
        '400': { description: Invalid input }
        '401': { description: Unauthorized }

  /brands/{id}:
    get:
      tags: [Brands]
      summary: Get a brand by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Brand details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Brand'
        '404': { description: Brand not found }

    put:
      tags: [Brands]
      summary: Update a brand (optionally replace logo)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BrandUpdate'
      responses:
        '200':
          description: Brand updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Brand'
        '400': { description: Invalid input }
        '401': { description: Unauthorized }
        '404': { description: Brand not found }

    delete:
      tags: [Brands]
      summary: Delete a brand
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Brand deleted successfully }
        '404': { description: Brand not found }

  /brands/{id}/products:
    get:
      tags: [Brands]
      summary: Get products for a brand
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: List of products for the brand
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
        '404': { description: Brand not found }